version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: enrichplus-postgres
    environment:
      POSTGRES_DB: enrichplus
      POSTGRES_USER: enrich_user
      POSTGRES_PASSWORD: enrich_pass
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data:
