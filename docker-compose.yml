version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: enrichplus-postgres
    environment:
      POSTGRES_DB: enrichplus
      POSTGRES_USER: enrich_user
      POSTGRES_PASSWORD: enrich_pass
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enrich_user -d enrichplus"]
      interval: 10s
      timeout: 5s
      retries: 5

  demand-service:
    build:
      context: .
      dockerfile: demand-service/Dockerfile
    container_name: enrichplus-demand-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/enrichplus
      SPRING_DATASOURCE_USERNAME: enrich_user
      SPRING_DATASOURCE_PASSWORD: enrich_pass
    ports:
      - "8081:8081"

  staffing-service:
    build:
      context: .
      dockerfile: staffing-service/Dockerfile
    container_name: enrichplus-staffing-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/enrichplus
      SPRING_DATASOURCE_USERNAME: enrich_user
      SPRING_DATASOURCE_PASSWORD: enrich_pass
    ports:
      - "8082:8082"

  allocation-service:
    build:
      context: .
      dockerfile: allocation-service/Dockerfile
    container_name: enrichplus-allocation-service
    depends_on:
      postgres:
        condition: service_healthy
      demand-service:
        condition: service_started
      staffing-service:
        condition: service_started
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/enrichplus
      SPRING_DATASOURCE_USERNAME: enrich_user
      SPRING_DATASOURCE_PASSWORD: enrich_pass
      CLIENTS_DEMAND_SERVICE_URL: http://demand-service:8081
      CLIENTS_STAFFING_SERVICE_URL: http://staffing-service:8082
    ports:
      - "8083:8083"

volumes:
  pg-data:
