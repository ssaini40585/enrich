server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/enrichplus}
    username: ${SPRING_DATASOURCE_USERNAME:enrich_user}
    password: ${SPRING_DATASOURCE_PASSWORD:enrich_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
