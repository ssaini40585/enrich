server:
  port: ${SERVER_PORT:8083}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/enrichplus}
    username: ${SPRING_DATASOURCE_USERNAME:enrich_user}
    password: ${SPRING_DATASOURCE_PASSWORD:enrich_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

clients:
  demand-service-url: ${CLIENTS_DEMAND_SERVICE_URL:http://localhost:8081}
  staffing-service-url: ${CLIENTS_STAFFING_SERVICE_URL:http://localhost:8082}
